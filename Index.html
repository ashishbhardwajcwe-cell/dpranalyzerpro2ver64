<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPR Analyzer Pro Ver63 - Border Roads Organisation</title>
  <link rel="icon" href="https://bro.gov.in/sites/default/files/bro-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#F5F7FA;min-height:100vh}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes dotGlow{0%,100%{box-shadow:0 0 4px rgba(34,197,94,0.4)}50%{box-shadow:0 0 12px rgba(34,197,94,0.8)}}
    @keyframes pcSpin{to{transform:rotate(360deg)}}
    .pc-spin{animation:pcSpin .8s linear infinite}
    ::selection{background:#0D9488;color:#fff}
    input:focus,textarea:focus{border-color:#0D9488!important;box-shadow:0 0 0 3px rgba(13,148,136,.1)!important}
    button{font-family:'Outfit',sans-serif}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
    .dev-credit{text-align:center;font-size:11px;color:#94A3B8;padding:8px 0;letter-spacing:.3px}
    @media print{
      .no-print{display:none!important}
      body{background:#fff!important}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    var useState = React.useState;
    var useRef = React.useRef;

    /* ============ CONFIGURATION ============ */
    var BRO_LOGO = "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Border_Roads_Organisation_Logo.png/150px-Border_Roads_Organisation_Logo.png";
    var MAX_CHARS_PER_FILE = 150000;
    var ACCEPT_STRING = ".pdf,.doc,.docx,.txt,.xlsx,.xls,.csv,.md";
    var SITE_PASSWORD = "BRO@DPR2026";

    /* Analysis progress messages - NO mention of any AI/backend */
    var PROGRESS_MSGS = [
      "Parsing document structure...",
      "Cross-referencing against IRC:37 - Flexible Pavement Design...",
      "Checking compliance with IRC:73 - Geometric Design Standards...",
      "Verifying MoRTH 5th Revision specifications...",
      "Analyzing pavement design parameters and CBR values...",
      "Checking drainage design against IRC:SP:42...",
      "Reviewing bridge/culvert design per IRC:6 and IRC:112...",
      "Verifying traffic survey data per IRC:SP:19...",
      "Checking road safety provisions per IRC:SP:55...",
      "Examining BOQ rates and cost estimation...",
      "Validating environmental clearances and NOCs...",
      "Cross-checking geometric alignment parameters...",
      "Reviewing material specifications compliance...",
      "Analyzing structural design calculations...",
      "Compiling deficiency report..."
    ];

    var SEVERITY_CONFIG = {
      critical:{bg:"#FEE2E2",border:"#DC2626",text:"#991B1B",badge:"#DC2626",emoji:"\u{1F534}",label:"Critical"},
      major:{bg:"#FEF3C7",border:"#D97706",text:"#92400E",badge:"#D97706",emoji:"\u{1F7E1}",label:"Major"},
      minor:{bg:"#DBEAFE",border:"#2563EB",text:"#1E40AF",badge:"#2563EB",emoji:"\u{1F535}",label:"Minor"},
      observation:{bg:"#F3F4F6",border:"#6B7280",text:"#374151",badge:"#6B7280",emoji:"\u26AA",label:"Info"}
    };
    var CATEGORY_CONFIG = {
      Design:{emoji:"\u{1F4D0}",color:"#7C3AED"},Pavement:{emoji:"\u{1F6E3}\uFE0F",color:"#2563EB"},
      Drainage:{emoji:"\u{1F30A}",color:"#0891B2"},Safety:{emoji:"\u26A0\uFE0F",color:"#DC2626"},
      Cost:{emoji:"\u{1F4B0}",color:"#D97706"},Survey:{emoji:"\u{1F4CF}",color:"#059669"},
      Structural:{emoji:"\u{1F3D7}\uFE0F",color:"#9333EA"},Environmental:{emoji:"\u{1F33F}",color:"#16A34A"},
      Land:{emoji:"\u{1F4CD}",color:"#EA580C"},Utilities:{emoji:"\u26A1",color:"#CA8A04"},
      Schedule:{emoji:"\u{1F4C5}",color:"#4F46E5"},Quality:{emoji:"\u2705",color:"#0D9488"},
      Documentation:{emoji:"\u{1F4C4}",color:"#64748B"}
    };
    var RISK_CONFIG = {
      Low:{color:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0"},
      Moderate:{color:"#D97706",bg:"#FFFBEB",border:"#FDE68A"},
      High:{color:"#DC2626",bg:"#FEF2F2",border:"#FECACA"},
      Severe:{color:"#7F1D1D",bg:"#FEE2E2",border:"#FCA5A5"}
    };
    /* Ver63: IRC reference MD files that must load before analysis */
    var GITHUB_BASE_URL="https://raw.githubusercontent.com/ashishbhardwajcwe-cell/dpranalyzerpro2ver63/main/guidelines/";
    var IRC_REF_FILES=[
      {file:"IRC_37_2018_Extracted.md",            label:"IRC:37",     version:"2018"},
      {file:"IRC_52_2019_Extraction.md",           label:"IRC:52",     version:"2019"},
      {file:"IRC_73_1980_Extraction.md",           label:"IRC:73",     version:"1980"},
      {file:"IRC_SP13_DPR_Analyzer_Extraction.md", label:"IRC:SP:13",  version:"—"},
      {file:"IRC_SP19_DPR_Analyzer_Extraction.md", label:"IRC:SP:19",  version:"—"},
      {file:"IRC_SP42_2014_DPR_Analyzer_Extraction.md",label:"IRC:SP:42",version:"2014"},
      {file:"IRC_SP48_2023_DPR_Analyzer_Extraction.md",label:"IRC:SP:48",version:"2023"},
      {file:"MoRTH_DPR_Reference_Extract.md",      label:"MoRTH 5th Revision", version:"5th Rev"}
    ];

    var STANDARD_GUIDELINES = [
      {code:"IRC:37",title:"Design of Flexible Pavements",category:"Pavement",hasRef:true},
      {code:"IRC:58",title:"Design of Rigid Pavements",category:"Pavement",hasRef:false},
      {code:"IRC:SP:19",title:"Survey, Investigation & Preparation of Road Projects",category:"Survey",hasRef:true},
      {code:"IRC:SP:84",title:"Specifications & Standards for Expressways",category:"Design",hasRef:false},
      {code:"IRC:73",title:"Geometric Design Standards for Rural Highways",category:"Design",hasRef:true},
      {code:"IRC:86",title:"Geometric Design Standards for Urban Roads",category:"Design",hasRef:false},
      {code:"IRC:6",title:"Road Bridges - Loads & Stresses",category:"Bridge",hasRef:false},
      {code:"IRC:112",title:"Code of Practice for Concrete Road Bridges",category:"Bridge",hasRef:false},
      {code:"IRC:SP:13",title:"Guidelines for Design of Small Bridges & Culverts",category:"Bridge",hasRef:true},
      {code:"MoRTH 5th Rev",title:"Specifications for Road & Bridge Works",category:"General",hasRef:true},
      {code:"IRC:SP:42",title:"Road Drainage Guidelines",category:"Drainage",hasRef:true},
      {code:"IRC:SP:55",title:"Road Safety Audit Guidelines",category:"Safety",hasRef:false},
      {code:"BR Regulations",title:"Building & Road Regulations",category:"General",hasRef:false},
      {code:"IS:1893",title:"Criteria for Earthquake Resistant Design",category:"Design",hasRef:false}
    ];

    /* ============ SESSION HELPERS ============ */
    function getSession(){try{return window.sessionStorage.getItem("dpr_auth")==="1"}catch(e){return false}}
    function setSession(){try{window.sessionStorage.setItem("dpr_auth","1")}catch(e){}}

    /* ============ FILE HELPERS ============ */
    function formatFileSize(bytes){
      if(bytes<1024) return bytes+" B";
      if(bytes<1048576) return (bytes/1024).toFixed(1)+" KB";
      return (bytes/1048576).toFixed(1)+" MB";
    }
    function getFileTypeLabel(file){
      var n=file.name.toLowerCase();
      if(n.endsWith(".xlsx")||n.endsWith(".xls")) return "\u{1F4CA} Excel";
      if(n.endsWith(".csv")) return "\u{1F4CA} CSV";
      if(n.endsWith(".pdf")) return "\u{1F4D5} PDF";
      if(n.endsWith(".doc")||n.endsWith(".docx")) return "\u{1F4D8} Word";
      if(n.endsWith(".txt")) return "\u{1F4C4} Text";
      return "\u{1F4CE} File";
    }
    function readFileAsBase64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1])};r.onerror=function(){rej(new Error("Read failed"))};r.readAsDataURL(file)})}
    function readFileAsText(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result)};r.onerror=function(){rej(new Error("Read failed"))};r.readAsText(file)})}
    function readExcelAsText(file){
      return new Promise(function(resolve,reject){
        var r=new FileReader();
        r.onload=function(e){
          try{
            var data=new Uint8Array(e.target.result);
            var wb=XLSX.read(data,{type:"array"});
            var fullText="";var totalChars=0;
            var maxPerSheet=Math.floor(MAX_CHARS_PER_FILE/Math.max(wb.SheetNames.length,1));
            wb.SheetNames.forEach(function(sn){
              if(totalChars>=MAX_CHARS_PER_FILE){fullText+="\n=== Sheet: "+sn+" === [SKIPPED]\n";return}
              var sheet=wb.Sheets[sn];
              var json=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
              var rows=json.filter(function(row){return row.some(function(c){return c!==""&&c!=null})});
              var mc=0;rows.forEach(function(row){for(var c=row.length-1;c>=0;c--){if(row[c]!==""&&row[c]!=null){mc=Math.max(mc,c+1);break}}});
              var tr=rows.map(function(row){return row.slice(0,mc).map(function(c){return c!=null?String(c).trim():""})});
              var st="\n=== Sheet: "+sn+" ("+tr.length+" rows x "+mc+" cols) ===\n";
              if(tr.length>0) st+=tr[0].join(",")+"\n";
              if(tr.length>600){
                for(var i=1;i<Math.min(501,tr.length);i++) st+=tr[i].join(",")+"\n";
                st+="\n...[rows omitted]...\n\n";
                for(var j=Math.max(tr.length-50,501);j<tr.length;j++) st+=tr[j].join(",")+"\n";
              }else{for(var k=1;k<tr.length;k++) st+=tr[k].join(",")+"\n"}
              if(st.length>maxPerSheet) st=st.substring(0,maxPerSheet)+"\n[...truncated]\n";
              fullText+=st;totalChars+=st.length;
            });
            resolve(fullText);
          }catch(err){reject(new Error("Excel error: "+err.message))}
        };
        r.onerror=function(){reject(new Error("Read failed"))};r.readAsArrayBuffer(file);
      });
    }
    function processFile(file){
      var ext=file.name.split(".").pop().toLowerCase();
      if(ext==="xlsx"||ext==="xls"||ext==="csv"){return readExcelAsText(file).then(function(t){return{type:"text",text:"[FILE: "+file.name+"]\n"+t}})}
      if(ext==="pdf"){return readFileAsBase64(file).then(function(b){return[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b}},{type:"text",text:"[FILE: "+file.name+"]"}]})}
      return readFileAsText(file).then(function(t){return{type:"text",text:"[FILE: "+file.name+"]\n"+t}});
    }
    function cleanJSON(raw){
      var s=raw.replace(/```json|```/g,"").trim();
      var m=s.match(/\{[\s\S]*\}/);if(!m) return null;s=m[0];
      s=s.replace(/,\s*\]/g,"]").replace(/,\s*\}/g,"}");
      s=s.replace(/[\x00-\x1F\x7F]/g,function(c){if(c==="\n"||c==="\r"||c==="\t") return " ";return ""});
      s=s.replace(/\}\s*\{/g,"},{");s=s.replace(/,,+/g,",");return s;
    }
    function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

    /* ============ PASSWORD GATE ============ */
    function PasswordGate(props){
      var ps=useState("");var pw=ps[0];var setPw=ps[1];
      var es=useState("");var err=es[0];var setErr=es[1];
      function check(){if(pw===SITE_PASSWORD){setSession();props.onPass()}else{setErr("Incorrect password. Access denied.")}}
      function onKey(e){if(e.key==="Enter")check()}
      return(
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{backgroundColor:"#fff",borderRadius:20,padding:"40px 36px",maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",textAlign:"center"}}>
            <img src={BRO_LOGO} alt="BRO" style={{height:70,marginBottom:16,borderRadius:8}} onError={function(e){e.target.style.display="none"}}/>
            <h1 style={{margin:"0 0 4px",fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:800,color:"#1a1a2e"}}>DPR Analyzer Pro <span style={{fontSize:13,color:"#0D9488",fontWeight:700}}>Ver63</span></h1>
            <p style={{margin:"0 0 4px",fontSize:12,color:"#64748B"}}>Border Roads Organisation</p>
            <p style={{margin:"0 0 24px",fontSize:11,color:"#94A3B8"}}>Developed by Col Ashish Bhardwaj</p>
            <div style={{backgroundColor:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:10,padding:"12px 16px",marginBottom:20,textAlign:"left"}}>
              <p style={{margin:0,fontSize:12,color:"#9A3412",lineHeight:1.5}}>{"\u{1F512} This application is password protected. Authorized personnel only."}</p>
            </div>
            <input type="password" placeholder="Enter access password" value={pw} onChange={function(e){setPw(e.target.value);setErr("")}} onKeyDown={onKey}
              style={{width:"100%",padding:"14px 18px",borderRadius:12,border:"2px solid #E2E8F0",fontSize:15,outline:"none",textAlign:"center",letterSpacing:2,boxSizing:"border-box",marginBottom:12}}/>
            <button onClick={check} style={{width:"100%",padding:14,borderRadius:12,border:"none",background:"linear-gradient(135deg,#0D9488,#0F766E)",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>{"Unlock \u{1F513}"}</button>
            {err&&<p style={{margin:"12px 0 0",fontSize:13,color:"#DC2626",fontWeight:600}}>{err}</p>}
          </div>
        </div>
      );
    }

    /* ============ SHARED COMPONENTS ============ */
    function DevCredit(){return React.createElement("div",{className:"dev-credit",style:{marginTop:"12px",borderTop:"1px solid #E2E8F0",paddingTop:"10px"}},"Developed by Col Ashish Bhardwaj | Border Roads Organisation")}

    /* Ver63: Guideline-load status banner */
    function GuidelineLoadStatus(props){
      var status=props.status;var loaded=props.loaded||[];var failed=props.failed||[];
      if(status==="loading"){
        return(<div style={{backgroundColor:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:"12px",padding:"12px 16px",marginBottom:"16px",fontSize:"13px",color:"#1E3A8A",display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"16px"}}>{"⏳"}</span>
          <span>Loading IRC reference guidelines from repository...</span>
        </div>);
      }
      if(status==="error"){
        return(<div style={{backgroundColor:"#FEF2F2",border:"2px solid #FCA5A5",borderRadius:"12px",padding:"14px 18px",marginBottom:"16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
            <span style={{fontSize:"18px"}}>{"\u{1F6D1}"}</span>
            <strong style={{fontSize:"14px",color:"#991B1B"}}>Analysis blocked — guideline files failed to load</strong>
          </div>
          <div style={{fontSize:"12px",color:"#7F1D1D",marginBottom:"8px"}}>The following IRC reference document(s) could not be fetched. Analysis cannot start until every guideline loads successfully.</div>
          <div style={{backgroundColor:"#fff",border:"1px solid #FECACA",borderRadius:"8px",padding:"8px 12px",marginBottom:"10px"}}>
            {failed.map(function(f){return <div key={f.file} style={{fontSize:"12px",fontFamily:"monospace",color:"#7F1D1D",padding:"2px 0"}}>{"• "+f.label+" — "+f.file+" ("+f.reason+")"}</div>})}
          </div>
          {loaded.length>0&&<div style={{fontSize:"11px",color:"#64748B",marginBottom:"8px"}}>{loaded.length+" file"+(loaded.length!==1?"s":"")+" did load: "+loaded.map(function(l){return l.label}).join(", ")}</div>}
          <button onClick={props.onRetry} style={{padding:"8px 16px",borderRadius:"8px",border:"none",background:"linear-gradient(135deg,#DC2626,#B91C1C)",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>{"↻ Retry loading guidelines"}</button>
        </div>);
      }
      if(status==="ok"){
        return(<div style={{backgroundColor:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:"12px",padding:"12px 16px",marginBottom:"16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
            <span style={{fontSize:"16px"}}>{"✅"}</span>
            <strong style={{fontSize:"13px",color:"#166534"}}>{"All "+loaded.length+" guideline document"+(loaded.length!==1?"s":"")+" loaded successfully"}</strong>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
            {loaded.map(function(l){return <span key={l.file} title={l.file+" — "+l.bytes+" chars"} style={{fontSize:"11px",fontFamily:"monospace",backgroundColor:"#fff",border:"1px solid #BBF7D0",borderRadius:"4px",padding:"2px 8px",color:"#15803D",fontWeight:600}}>{l.label+" ("+l.version+")"}</span>})}
          </div>
        </div>);
      }
      return null;
    }

    function StepIndicator(props){
      return(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",margin:"20px 0 28px",padding:"0 10px"}}>
          {props.steps.map(function(step,i){
            return(<div key={i} style={{display:"flex",alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                <div style={{width:"36px",height:"36px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:700,backgroundColor:i<props.currentStep?"#10B981":i===props.currentStep?"#1a1a2e":"#E2E8F0",color:i<=props.currentStep?"#fff":"#94A3B8",boxShadow:i===props.currentStep?"0 0 0 4px rgba(26,26,46,0.15)":"none"}}>{i<props.currentStep?"\u2713":step.emoji}</div>
                <span style={{fontSize:"11px",fontWeight:i===props.currentStep?700:500,color:i<=props.currentStep?"#1a1a2e":"#94A3B8",textAlign:"center",maxWidth:"70px"}}>{step.label}</span>
              </div>
              {i<props.steps.length-1&&<div style={{width:"40px",height:"2px",margin:"0 4px",backgroundColor:i<props.currentStep?"#10B981":"#E2E8F0",marginBottom:"22px"}}/>}
            </div>);
          })}
        </div>
      );
    }

    function FileUploadZone(props){
      var inputRef=useRef(null);
      var ds=useState(false),dragOver=ds[0],setDragOver=ds[1];
      function openPicker(e){e.stopPropagation();if(inputRef.current){inputRef.current.value="";inputRef.current.click()}}
      function onInput(e){var fl=e.target.files;if(fl&&fl.length>0){var a=[];for(var i=0;i<fl.length;i++)a.push(fl[i]);props.onAddFiles(a)}if(inputRef.current)inputRef.current.value=""}
      function onDrop(e){e.preventDefault();e.stopPropagation();setDragOver(false);var fl=e.dataTransfer.files;if(fl&&fl.length>0){var a=[];for(var i=0;i<fl.length;i++)a.push(fl[i]);props.onAddFiles(a)}}
      return(
        <div style={{marginBottom:"16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
            <span style={{fontSize:"22px"}}>{props.icon}</span>
            <div style={{flex:1}}><h3 style={{margin:0,fontSize:"16px",fontWeight:700,color:"#1a1a2e"}}>{props.label}</h3><p style={{margin:0,fontSize:"13px",color:"#64748B"}}>{props.description}</p></div>
          </div>
          <input ref={inputRef} type="file" multiple accept={ACCEPT_STRING} onChange={onInput} style={{display:"none"}}/>
          <div onDragOver={function(e){e.preventDefault();setDragOver(true)}} onDragLeave={function(){setDragOver(false)}} onDrop={onDrop} onClick={openPicker}
            style={{border:"2px dashed "+(dragOver?"#0D9488":"#CBD5E1"),borderRadius:"14px",padding:props.files.length>0?"20px":"36px 20px",textAlign:"center",cursor:"pointer",backgroundColor:dragOver?"#F0FDFA":"#FAFBFC"}}>
            {props.files.length===0?(
              <div><div style={{fontSize:"40px",marginBottom:"10px",opacity:.5}}>{"\u{1F4C2}"}</div>
              <p style={{margin:0,fontSize:"15px",color:"#475569"}}><span style={{color:"#0D9488",fontWeight:700}}>Click to browse</span> or drag & drop</p>
              <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:"6px",marginTop:"12px"}}>
                {["PDF","Excel","CSV","Word","Text"].map(function(f){return <span key={f} style={{padding:"3px 10px",borderRadius:"6px",fontSize:"11px",backgroundColor:"#F1F5F9",color:"#64748B"}}>{f}</span>})}
              </div></div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {props.files.map(function(f,i){
                  return(<div key={f.name+"_"+i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",backgroundColor:"#fff",borderRadius:"10px",border:"1px solid #E2E8F0",textAlign:"left"}}>
                    <div style={{overflow:"hidden",flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                      <div style={{fontSize:"11px",color:"#94A3B8"}}>{getFileTypeLabel(f).split(" ").slice(1).join(" ")+" \u00B7 "+formatFileSize(f.size)}</div>
                    </div>
                    <button onClick={function(e){e.preventDefault();e.stopPropagation();props.onRemoveFile(i)}} style={{background:"#FEF2F2",border:"1px solid #FECACA",cursor:"pointer",color:"#EF4444",fontSize:"13px",padding:"4px 10px",borderRadius:"6px",fontWeight:600,marginLeft:"10px"}}>Remove</button>
                  </div>);
                })}
                <div style={{fontSize:"13px",color:"#0D9488",fontWeight:600,marginTop:"4px"}}>+ Click to add more</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function GuidelineSelector(props){
      var cats=[];var seen={};STANDARD_GUIDELINES.forEach(function(g){if(!seen[g.category]){seen[g.category]=true;cats.push(g.category)}});
      return(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px",padding:"8px 12px",backgroundColor:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"8px"}}>
            <span style={{fontSize:"12px"}}>{"\u{1F6AB}"}</span>

      function safeFileBase(){
        var hdr=results.reportHeader||{};
        var base=(hdr.projectName||hdr.roadNumber||"DPR_Analysis_Report").replace(/[^A-Za-z0-9._-]+/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
        return base||"DPR_Analysis_Report";
      }

        setTimeout(function(){w.focus();w.print()},500);
      }
      function handleDownloadWord(){
        var html=buildReportHTML("word");
        /* Word recognises HTML packaged with these MSO headers */
        var docHtml="<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>"+html.replace(/^[\s\S]*?<body[^>]*>/i,"").replace(/<\/body>[\s\S]*$/i,"")+"</body></html>";
        var blob=new Blob(["﻿"+docHtml],{type:"application/msword"});
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");a.href=url;a.download=safeFileBase()+".doc";document.body.appendChild(a);a.click();
        setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},300);
      }

        w.document.write(buildReportHTML("print"));w.document.close();w.focus();

      /* ===== Podcast / Audio Overview (NotebookLM-style two-host) ===== */
      /* Two hosts. Voice names are Gemini prebuilt voices. */
      var PC_SPEAKERS={A:{name:"Anjali",voice:"Kore"},B:{name:"Rohan",voice:"Puck"}};

      function pcB64ToBytes(b64){var bin=atob(b64);var n=bin.length;var u=new Uint8Array(n);for(var i=0;i<n;i++)u[i]=bin.charCodeAt(i);return u}

      function pcmToWavBlob(pcm,rate){
        var numCh=1,bps=16,byteRate=rate*numCh*bps/8,blockAlign=numCh*bps/8,ds=pcm.length;
        var buf=new ArrayBuffer(44+ds),v=new DataView(buf);
        function wstr(o,s){for(var i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}
        wstr(0,"RIFF");v.setUint32(4,36+ds,true);wstr(8,"WAVE");wstr(12,"fmt ");
        v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,numCh,true);
        v.setUint32(24,rate,true);v.setUint32(28,byteRate,true);v.setUint16(32,blockAlign,true);v.setUint16(34,bps,true);
        wstr(36,"data");v.setUint32(40,ds,true);
        var out=new Uint8Array(buf);out.set(pcm,44);
        return new Blob([out],{type:"audio/wav"});
      }

      async function pcGenerateScript(){
        var hdr=results.reportHeader||{};
        var proj=hdr.projectName||"this BRO road project";
        var ordr={critical:0,major:1,minor:2,observation:3};
        var defs=(results.deficiencies||[]).slice().sort(function(a,b){return (ordr[a.severity]==null?9:ordr[a.severity])-(ordr[b.severity]==null?9:ordr[b.severity])});
        var top=defs.slice(0,10);
        var lines=[];
        lines.push("PROJECT: "+proj+(hdr.roadNumber?" ("+hdr.roadNumber+")":""));
        lines.push("COMPLIANCE SCORE: "+results.complianceScore+"%");
        lines.push("RISK LEVEL: "+(results.riskLevel||"Not stated"));
        lines.push("OVERALL SUMMARY: "+(results.summary||""));
        lines.push("");
        lines.push("KEY DEFICIENCIES (most important first):");
        top.forEach(function(d,i){
          var cl=(d.documentName&&d.documentName!=="General Observation")?(" ["+d.documentName+" "+(d.clauseNumber||"")+"]"):"";
          lines.push((i+1)+". ("+(d.severity||"")+") "+(d.title||"")+cl);
          if(d.failureReason||d.description)lines.push("   Problem: "+String(d.failureReason||d.description).slice(0,300));
          if(d.impact)lines.push("   Why it matters: "+String(d.impact).slice(0,220));
          if(d.correctiveAction||d.recommendation)lines.push("   Fix: "+String(d.correctiveAction||d.recommendation).slice(0,220));
        });
        var digest=lines.join("\n");
        var sys="You are a scriptwriter for an audio overview, in the style of a friendly two-host podcast (like NotebookLM Audio Overviews). Two Indian-English hosts discuss a technical engineering report so a non-specialist can follow it. Host A is \"Anjali\", a senior highway reviewing engineer who explains clearly. Host B is \"Rohan\", a curious co-host who asks the questions a layperson would ask. Keep it warm, natural and conversational with short turns, light back-and-forth, and the occasional brief reaction. Explain any jargon in plain words. Cover: what the project is, the overall compliance score and risk level and what they mean, the 4 to 6 most important problems in plain terms (what is wrong, why it matters for a high-altitude mountain road, and how to fix it), and a clear bottom-line takeaway. Aim for about 2.5 to 3.5 minutes of speech, roughly 16 to 22 short turns. Open with a quick welcome and close with a sign-off. Output STRICT JSON only, no markdown, no backticks, in exactly this shape: {\"title\":\"...\",\"turns\":[{\"speaker\":\"A\",\"text\":\"...\"}]} where speaker is exactly \"A\" for Anjali or \"B\" for Rohan. Do NOT put the speaker name inside the text.";
        var body=JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4000,system:sys,messages:[{role:"user",content:"Create the audio-overview podcast script from this DPR compliance analysis:\n\n"+digest}]});
        var r=await fetch("/.netlify/functions/anthropic-proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:body});
        if(!r.ok){var e={};try{e=await r.json()}catch(x){}throw new Error((e.error&&e.error.message)||("Script generation failed ("+r.status+")"))}
        var dd=await r.json();
        var t=dd.content.map(function(b){return b.type==="text"?b.text:""}).join("");
        var c=cleanJSON(t);if(!c)throw new Error("Could not read the generated script.");
        var parsed=JSON.parse(c);
        if(!parsed.turns||!parsed.turns.length)throw new Error("The generated script was empty.");
        parsed.turns=parsed.turns.filter(function(x){return x&&x.text&&String(x.text).trim()}).map(function(x){return {speaker:(x.speaker==="B"?"B":"A"),text:String(x.text).trim()}});
        return parsed;
      }

      async function pcSynthChunk(turns){
        var present={};turns.forEach(function(t){present[t.speaker]=true});
        var keys=Object.keys(present);
        var speechConfig;
        if(keys.length>=2){
          speechConfig={multiSpeakerVoiceConfig:{speakerVoiceConfigs:keys.map(function(k){return {speaker:PC_SPEAKERS[k].name,voiceConfig:{prebuiltVoiceConfig:{voiceName:PC_SPEAKERS[k].voice}}}})}};
        }else{
          var only=keys[0]||"A";
          speechConfig={voiceConfig:{prebuiltVoiceConfig:{voiceName:PC_SPEAKERS[only].voice}}};
        }
        var prompt="Read this podcast conversation aloud in a warm, friendly, natural tone:\n"+turns.map(function(t){return PC_SPEAKERS[t.speaker].name+": "+t.text}).join("\n");
        var body=JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseModalities:["AUDIO"],speechConfig:speechConfig}});
        var r=await fetch("/.netlify/functions/gemini-tts",{method:"POST",headers:{"Content-Type":"application/json"},body:body});
        if(!r.ok){var e={};try{e=await r.json()}catch(x){}throw new Error((e.error&&e.error.message)||("Audio generation failed ("+r.status+")"))}
        var dd=await r.json();
        var cand=dd&&dd.candidates&&dd.candidates[0];
        var part=cand&&cand.content&&cand.content.parts&&cand.content.parts[0];
        var inl=part&&part.inlineData;
        if(!inl||!inl.data)throw new Error("No audio was returned for one segment.");
        var rate=24000;var m=/rate=(\d+)/.exec(inl.mimeType||"");if(m)rate=parseInt(m[1]);
        return {pcm:pcB64ToBytes(inl.data),rate:rate};
      }

      async function generatePodcast(){
        if(pcStatus==="scripting"||pcStatus==="audio")return;
        if(!props.geminiKey){setPcErr("The podcast voice service is not configured. Add a GEMINI_API_KEY in the Netlify environment to enable audio overviews.");setPcStatus("error");return}
        if(pcUrl){try{URL.revokeObjectURL(pcUrl)}catch(e){}}
        setPcUrl("");setPcErr("");setPcShowText(false);
        try{
          setPcStatus("scripting");setPcMsg("Writing the podcast script...");
          var script=await pcGenerateScript();
          setPcScript(script);
          setPcStatus("audio");
          var chunks=[];var cur=[];var curLen=0;
          script.turns.forEach(function(t){
            var L=t.text.length+12;
            if(curLen+L>1100&&cur.length>0){chunks.push(cur);cur=[];curLen=0}
            cur.push(t);curLen+=L;
          });
          if(cur.length)chunks.push(cur);
          var rate=24000;var parts=[];var totalLen=0;
          for(var i=0;i<chunks.length;i++){
            setPcMsg("Generating audio "+(i+1)+" of "+chunks.length+"...");
            var seg=await pcSynthChunk(chunks[i]);
            rate=seg.rate;parts.push(seg.pcm);totalLen+=seg.pcm.length;
          }
          var all=new Uint8Array(totalLen);var off=0;
          parts.forEach(function(p){all.set(p,off);off+=p.length});
          var u=URL.createObjectURL(pcmToWavBlob(all,rate));
          setPcUrl(u);setPcMsg("");setPcStatus("ready");
        }catch(err){setPcErr(err.message||"Podcast generation failed.");setPcStatus("error")}
      }

                <button onClick={generatePodcast} disabled={pcStatus==="scripting"||pcStatus==="audio"} title="Generate a short two-host audio overview of this report" style={{background:(pcStatus==="scripting"||pcStatus==="audio")?"#7C3AED":"linear-gradient(135deg,#7C3AED,#9333EA)",border:"1px solid #7C3AED",color:"#fff",padding:"8px 16px",borderRadius:"8px",cursor:(pcStatus==="scripting"||pcStatus==="audio")?"wait":"pointer",fontSize:"12px",fontWeight:700,opacity:(pcStatus==="scripting"||pcStatus==="audio")?0.8:1}}>{(pcStatus==="scripting"||pcStatus==="audio")?"\u{1F399}\uFE0F Generating\u2026":"\u{1F399}\uFE0F Podcast"}</button>
                <button onClick={props.onReset} style={{backgroundColor:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",padding:"8px 16px",borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:600}}>{"\u{1F504} New Analysis"}</button>
              </div>

          blocks.push({type:"text",text:"Analyze the DPR document(s) above against guidelines and regulatory requirements."+gt+ct+"\n\nPerform a professional DPR compliance audit specifically for a BRO hill/mountain road project. PRIORITY CODES FOR BRO: IRC:SP:48 (Hill Road Design — check hairpin bends, formation width, hill cutting, retaining walls, side drains), IRC:52 (Mountain Roads), IRC:73 (Geometric Design — gradients, curves, sight distance), IRC:SP:13 (Culverts and minor bridges), IRC:SP:42 (Drainage — especially cross drainage in hill terrain, catch water drains, scuppers). Check all of: traffic data, geometric design, pavement, drainage, safety, environmental, land acquisition, cost estimation, material specs, bridges/culverts, survey, drawings, utilities, schedule, quality plan.\n\nCLAUSE-LEVEL CITATION RULES (MANDATORY — VER63):\nEvery deficiency MUST be backed by a specific clause from a loaded [IRC REFERENCE: filename] document. For every finding you MUST populate ALL of these fields:\n  - documentName: the exact document code, e.g. \"IRC:SP:42\", \"IRC:73\", \"IRC:SP:48\", \"MoRTH 5th Revision\". Take this from the [IRC REFERENCE: filename] header of the document you pulled the clause from.\n  - clauseNumber: the exact clause/section/table number as printed in that document, e.g. \"Clause 4.3.2\", \"Section 5.4\", \"Table 3.1\". DO NOT invent or paraphrase. Quote it verbatim.\n  - clauseSummary: a SINGLE concise line (max 30 words) stating what that specific clause requires.\n  - failureReason: a precise statement of HOW the DPR fails to meet this specific clause — quote the value/text from the DPR and contrast it with the clause's requirement.\nIf — and only if — the relevant clause cannot be located inside any [IRC REFERENCE: filename] block above, you MUST set:\n  - documentName: \"General Observation\"\n  - clauseNumber: \"N/A\"\n  - clauseSummary: \"General Observation — clause reference not available\"\n  - failureReason: still describe how the ency is not corrected - structural risk, cost overrun, safety hazard, project delay, regulatory rejection etc. 2-3 sentences.\",\"recommendation\":\"Step-by-step actionable fix with specific standards to follow, calculations to perform, data to collect, or sections to add. 2-3 sentences.\",\"correctiveAction\":\"A precise, numbered Recommended Corrective Action the design team can execute — what to redo, recalculate, or insert, in concrete engineering terms. 2-3 sentences.\",\"severityJustification\":\"Explanation of why this finding is Critical / Major / Minor / Observation, anchored in the cited clause (e.g. 'Critical because IRC:SP:48 Clause 6.2 mandates minimum hairpin radius of 14 m for hill roads carrying buses; DPR shows 9 m — direct safety hazard.'). 1-2 sentences.\"}]}\n\ncomplianceType rules: use 'Documentation' for findings about missing/incomplete documents, signatures, drawings, registers, certifications, NOCs, approvals or report sections. Use 'Design' for everything substantive about geometry, pavement, drainage, structures, safety, materials, calculations, BOQ correctness, etc.\n\nSeverity definitions: critical=direct safety hazard or mandatory IRC/MoRTH code violation; major=significant technical flaw or missing mandatory calculation; minor=incomplete or insufficient data, missing supporting documents, inadequate detail; observation=suggestion for improvement or best practice recommendation. A well-prepared DPR will typically have a balanced mix of all four severity levels. Provide detailed content in description, impact, and recommendation fields (2-3 sentences each). Minimum 12 findings. Maximum 20."});

    Project Arunank
  </span>
</p>
              </div>
            </div>
          </div>

          <div style={{maxWidth:"840px",margin:"0 auto",padding:"8px 16px 40px"}}>
            {step<4&&<StepIndicator currentStep={step<3?step:2} steps={STEPS}/>}

            {/* STEP 0: Guidelines (NO API key box) */}
            {step===0&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <div style={{backgroundColor:"#F0FDFA",border:"1px solid #99F6E4",borderRadius:"14px",padding:"18px 20px",marginBottom:"20px"}}>
                  <h3 style={{margin:"0 0 6px",fontSize:"15px",fontWeight:700,color:"#0F766E"}}>{"\u{1F44B} Welcome!"}</h3>
                  <p style={{margin:0,fontSize:"13px",color:"#115E59",lineHeight:1.6}}>Analyze your DPR against IRC codes, MoRTH specifications, and other regulatory guidelines. Select the applicable standards below and upload your DPR document.</p>
                </div>
                {apiStatus==="error"&&(
                  <div style={{backgroundColor:"#FEF2F2",border:"1px solid #FECACA",borderRadius:"12px",padding:"14px 18px",marginBottom:"16px",fontSize:"13px",color:"#DC2626"}}>
                    {"\u26A0\uFE0F Analysis engine is not configured. Please contact the administrator to set up the environment variable."}
                  </div>
                )}
                <GuidelineLoadStatus status={glStatus} loaded={glLoaded} failed={glFailedList} onRetry={loadGuidelines}/>
                <div style={{backgroundColor:"#fff",borderRadius:"16px",padding:"22px",marginBottom:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",border:"1px solid #E2E8F0"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
                    <span style={{fontSize:"20px"}}>{"\u{1F4CB}"}</span>
                    <div style={{flex:1}}><h3 style={{margin:0,fontSize:"15px",fontWeight:700,color:"#1a1a2e"}}>Select Guidelines</h3><p style={{margin:"2px 0 0",fontSize:"12px",color:"#94A3B8"}}>Choose standard codes or upload custom</p></div>
                    <button onClick={selectAllGL} style={{fontSize:"12px",color:"#0D9488",background:"#F0FDFA",border:"1px solid #99F6E4",cursor:"pointer",padding:"6px 12px",borderRadius:"6px",fontWeight:600}}>{selGL.length===STANDARD_GUIDELINES.length?"Deselect All":"Select All"}</button>
                  </div>
                  <GuidelineSelector selected={selGL} onToggle={toggleGL}/>
                  <div style={{marginTop:"20px",borderTop:"1px solid #F1F5F9",paddingTop:"16px"}}>
                    <FileUploadZone label="Upload Custom Guidelines (Optional)" description="Your own regulation documents" files={gFiles} onAddFiles={addGFiles} onRemoveFile={removeGFile} icon={"\u{1F4E4}"}/>
                  </div>
                </div>
                <button onClick={function(){if(glStatus!=="ok"){setError("Guidelines have not finished loading \u2014 see banner above.");return}if(canStep0){setError("");setStep(2)}else setError("Select at least one guideline.")}} disabled={glStatus!=="ok"} style={{width:"100%",padding:"16px",borderRadius:"12px",border:"none",background:(canStep0&&glStatus==="ok")?"linear-gradient(135deg,#0D9488,#0F766E)":"#CBD5E1",color:"#fff",fontSize:"16px",fontWeight:700,cursor:(canStep0&&glStatus==="ok")?"pointer":"not-allowed"}}>{glStatus==="loading"?"Loading guidelines...":glStatus==="error"?"Blocked \u2014 guideline files failed":"Next \u2192 Upload Your DPR"}</button>
                <DevCredit/>
              </div>
            )}

            {/* STEP 2: Upload DPR */}
            {step===2&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <GuidelineLoadStatus status={glStatus} loaded={glLoaded} failed={glFailedList} onRetry={loadGuidelines}/>
                <div style={{backgroundColor:"#fff",borderRadius:"16px",padding:"22px",marginBottom:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",border:"1px solid #E2E8F0"}}>
                  <FileUploadZone label="Upload Your DPR Document(s)" description="The DPR you want to analyze" files={dFiles} onAddFiles={addDFiles} onRemoveFile={removeDFile} icon={"\u{1F4D1}"}/>
                  <div style={{backgroundColor:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:"10px",padding:"12px 16px",marginTop:"8px"}}>
                    <div style={{fontSize:"13px",fontWeight:700,color:"#92400E",marginBottom:"4px"}}>{"\u{1F4A1} Supported: PDF, Excel (.xlsx/.xls), CSV, Word (.docx), Text (.txt)"}</div>
                  </div>
                </div>
                <div style={{backgroundColor:"#fff",borderRadius:"16px",padding:"22px",marginBottom:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",border:"1px solid #E2E8F0"}}>
                  <h3 style={{margin:"0 0 4px",fontSize:"15px",fontWeight:700,color:"#1a1a2e"}}>{"\u{1F4CB} Report Header Details"}</h3>
                  <p style={{margin:"0 0 14px",fontSize:"12px",color:"#94A3B8"}}>These appear on the BRO-styled PDF, Word and printed reports.</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
                    <div>
                      <label style={{display:"block",fontSize:"11px",fontWeight:700,color:"#475569",marginBottom:"4px",textTransform:"uppercase",letterSpacing:.4}}>DPR Project Name</label>
                      <input type="text" value={projectName} onChange={function(e){setProjectName(e.target.value)}} placeholder="e.g. Improvement of Tawang-Bumla Road" style={{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1.5px solid #E2E8F0",fontSize:"13px",fontFamily:"'Outfit',sans-serif",backgroundColor:"#FAFBFC",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:"11px",fontWeight:700,color:"#475569",marginBottom:"4px",textTransform:"uppercase",letterSpacing:.4}}>Road No. / Project Code</label>
                      <input type="text" value={roadNumber} onChange={function(e){setRoadNumber(e.target.value)}} placeholder="e.g. GREF-AR-NH13" style={{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1.5px solid #E2E8F0",fontSize:"13px",fontFamily:"'Outfit',sans-serif",backgroundColor:"#FAFBFC",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:"11px",fontWeight:700,color:"#475569",marginBottom:"4px",textTransform:"uppercase",letterSpacing:.4}}>Reviewing Officer Name</label>
                      <input type="text" value={officerName} onChange={function(e){setOfficerName(e.target.value)}} placeholder="e.g. Col Ashish Bhardwaj" style={{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1.5px solid #E2E8F0",fontSize:"13px",fontFamily:"'Outfit',sans-serif",backgroundColor:"#FAFBFC",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:"11px",fontWeight:700,color:"#475569",marginBottom:"4px",textTransform:"uppercase",letterSpacing:.4}}>Designation</label>
                      <input type="text" value={officerDesignation} onChange={function(e){setOfficerDesignation(e.target.value)}} placeholder="e.g. CWE (P) Arunank" style={{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1.5px solid #E2E8F0",fontSize:"13px",fontFamily:"'Outfit',sans-serif",backgroundColor:"#FAFBFC",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:"11px",fontWeight:700,color:"#475569",marginBottom:"4px",textTransform:"uppercase",letterSpacing:.4}}>Date of Review</label>
                      <input type="date" value={reviewDate} onChange={function(e){setReviewDate(e.target.value)}} style={{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1.5px solid #E2E8F0",fontSize:"13px",fontFamily:"'Outfit',sans-serif",backgroundColor:"#FAFBFC",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                  </div>
                </div>
                <div style={{backgroundColor:"#fff",borderRadius:"16px",padding:"22px",marginBottom:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",border:"1px solid #E2E8F0"}}>
                  <h3 style={{margin:"0 0 10px",fontSize:"15px",fontWeight:700,color:"#1a1a2e"}}>{"\u{1F4AC} Additional Context"} <span style={{fontWeight:400,color:"#94A3B8"}}>(Optional)</span></h3>
                  <textarea value={ctx} onChange={function(e){setCtx(e.target.value)}} placeholder={"e.g. 4-lane NH project in Rajasthan, 120km\nFocus on pavement design and drainage\nCheck BOQ rates against DSR 2024"} style={{width:"100%",minHeight:"100px",padding:"14px 16px",borderRadius:"12px",border:"1.5px solid #E2E8F0",fontSize:"13px",fontFamily:"'Outfit',sans-serif",resize:"vertical",backgroundColor:"#FAFBFC",outline:"none",boxSizing:"border-box",lineHeight:1.6}}/>
                </div>
                <div style={{display:"flex",gap:"12px"}}>
                  <button onClick={function(){setStep(0)}} style={{padding:"14px 24px",borderRadius:"12px",border:"1.5px solid #E2E8F0",backgroundColor:"#fff",color:"#64748B",fontSize:"14px",fontWeight:600,cursor:"pointer"}}>{"\u2190 Back"}</button>
                  <button onClick={function(){if(glStatus!=="ok"){setError("Guidelines failed to load — analysis is blocked. Return to the previous step to retry.");return}if(canStep2){setError("");analyze()}else setError("Upload at least one DPR document.")}} disabled={glStatus!=="ok"} style={{flex:1,padding:"16px",borderRadius:"12px",border:"none",background:(canStep2&&glStatus==="ok")?"linear-gradient(135deg,#0D9488,#0F766E)":"#CBD5E1",color:"#fff",fontSize:"16px",fontWeight:700,cursor:(canStep2&&glStatus==="ok")?"pointer":"not-allowed"}}>{glStatus==="error"?"Blocked — guideline files failed":"\u{1F50D} Analyze DPR Now"}</button>
                </div>
                <DevCredit/>
              </div>
            )}

            {/* STEP 3: Loading - Professional messages, NO AI/backend mention */}
            {step===3&&loading&&(
              <div style={{textAlign:"center",padding:"60px 20px",backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E2E8F0",animation:"fadeIn 0.3s ease"}}>
                <div style={{fontSize:"56px",marginBottom:"20px",animation:"pulse 2s infinite"}}>{"\u{1F50D}"}</div>
                <h2 style={{margin:"0 0 8px",fontFamily:"'Playfair Display',serif",fontSize:"22px",color:"#1a1a2e"}}>Analyzing Your DPR...</h2>
                <p style={{margin:"0 0 28px",fontSize:"14px",color:"#64748B"}}>{progress}</p>
                <div style={{width:"100%",maxWidth:"400px",margin:"0 auto",height:"8px",backgroundColor:"#E2E8F0",borderRadius:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:"4px",background:"linear-gradient(90deg,#0D9488,#14B8A6)",width:pct+"%",transition:"width 0.5s ease"}}/>
                </div>
                <p style={{margin:"10px 0 0",fontSize:"12px",color:"#94A3B8"}}>{pct+"%"}</p>
                <div style={{marginTop:"30px",padding:"16px",backgroundColor:"#F8FAFC",borderRadius:"10px",display:"inline-block"}}>
                  <p style={{margin:0,fontSize:"12px",color:"#64748B"}}>{"Checking compliance against IRC codes and MoRTH specifications. Typically takes 1-3 minutes."}</p>
                </div>
                <DevCredit/>
              </div>
            )}

            {/* STEP 4: Results */}
            {step===4&&results&&(<div style={{animation:"fadeIn 0.3s ease"}}><ResultsDashboard results={results} onReset={resetAll} apiKey={apiKeyRef.current} geminiKey={geminiKeyRef.current}/></div>)}

            {/* ERROR */}
            {error&&(
              <div style={{backgroundColor:"#FEF2F2",border:"2px solid #FECACA",borderRadius:"12px",padding:"16px 18px",marginTop:"16px",fontSize:"14px",color:"#DC2626",display:"flex",alignItems:"flex-start",gap:"10px"}}>
                <span style={{fontSize:"20px",flexShrink:0}}>{"\u26A0\uFE0F"}</span>
                <div style={{flex:1}}>
                  <strong style={{fontSize:"15px"}}>{"Error"+(glFetchFailed.length>0?" \u2014 Reference Files Failed to Load":"")}</strong>
                  <div style={{marginTop:"6px",whiteSpace:"pre-line",lineHeight:1.6}}>{error}</div>
                  {glFetchFailed.length>0&&(
                    <div style={{marginTop:"12px",padding:"10px 14px",backgroundColor:"#FFF",border:"1px solid #FECACA",borderRadius:"8px"}}>
                      <div style={{fontWeight:700,fontSize:"12px",color:"#991B1B",marginBottom:"6px"}}>{"Files that failed to load:"}</div>
                      {glFetchFailed.map(function(f){return <div key={f} style={{fontSize:"12px",fontFamily:"monospace",color:"#7F1D1D",padding:"2px 0"}}>{"\u2022 "+f}</div>})}
                      <button onClick={function(){setError("");setGlFetchFailed([]);analyze()}} style={{marginTop:"10px",padding:"9px 18px",borderRadius:"8px",border:"none",background:"linear-gradient(135deg,#DC2626,#B91C1C)",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>{"\u21BB Retry Loading Guidelines & Analyze"}</button>
                    </div>
                  )}
                  <button onClick={function(){setError("")}} style={{display:"inline-block",marginTop:"10px",fontSize:"12px",color:"#DC2626",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Dismiss</button>
                </div>
              </div>
            )}

            {/* HOW IT WORKS */}
            {step<3&&(
              <div style={{marginTop:"28px",padding:"18px 20px",borderRadius:"14px",backgroundColor:"#fff",border:"1px solid #E2E8F0"}}>
                <h3 style={{margin:"0 0 12px",fontSize:"14px",fontWeight:700,color:"#1a1a2e"}}>How It Works</h3>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:"16px"}}>
                  {[{icon:"\u{1F4CB}",t:"1. Select Guidelines",d:"Pick IRC codes & standards"},{icon:"\u{1F4D1}",t:"2. Upload DPR",d:"PDF, Excel, Word - any format"},{icon:"\u{1F50D}",t:"3. Compliance Check",d:"Cross-reference against codes"},{icon:"\u{1F4CA}",t:"4. Get Report",d:"Issues with fix recommendations"}].map(function(s){
                    return <div key={s.t} style={{textAlign:"center"}}><div style={{fontSize:"28px",marginBottom:"6px"}}>{s.icon}</div><div style={{fontSize:"13px",fontWeight:700,color:"#1a1a2e"}}>{s.t}</div><div style={{fontSize:"11px",color:"#94A3B8",marginTop:"2px"}}>{s.d}</div></div>;
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ============ ROOT WITH AUTH GATE ============ */
    function App(){
      var as=useState(function(){return getSession()});var authed=as[0];var setAuthed=as[1];
      if(!authed)return <PasswordGate onPass={function(){setAuthed(true)}}/>;
      return <DPRAnalyzer/>;
    }

    ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
  </script>
</body>
</html>
